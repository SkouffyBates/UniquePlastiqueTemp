<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Plastique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/acceuil.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="hero">
        <div class="hero-bg"></div>
        <div class="hero-blob hero-blob-1"></div>
        <div class="hero-blob hero-blob-2"></div>

        <div class="hero-layout">
            <div class="hero-content">
                <h1>Les seules pinces faites au Québec,<br><em> 100% recyclées.</em></h1>
                <div class="hero-stats">
                    <div class="hero-stat">
                        <strong>100%</strong>
                        <span>HDPE recyclé</span>
                    </div>
                    <div class="hero-stat">
                        <strong>10+</strong>
                        <span>Coloris disponibles</span>
                    </div>
                    <div class="hero-stat">
                        <strong>Local</strong>
                        <span>Fabriqué au Québec</span>
                    </div>
                </div>
            </div>

            <div class="hero-showcase">
                <div class="hero-showcase-copy">
                    <p class="hero-showcase-label">Tel que vue à l’émission</p>
                    <h2>Dans l'œil du Dragon</h2>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/navbar.js"></script>
</body>

</html>
